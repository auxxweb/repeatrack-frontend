<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0c1222" />
    <title>Offline – RepeaTrack</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        background: #080c18;
        color: #e2e8f0;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        text-align: center;
        padding: 32px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 8px;
      }
      p {
        margin: 0;
        font-size: 0.9rem;
        color: #94a3b8;
        line-height: 1.5;
      }
      a {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        border-radius: 10px;
        background: linear-gradient(to right, #2642e3, #3b5bef);
        color: white;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>RepeaTrack needs a network connection to sync visits and bookings. Check your connection and try again.</p>
      <a href="/">Back to app</a>
    </div>
  </body>
</html>
